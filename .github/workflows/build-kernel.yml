name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      source:
        description: Upstream source
        required: true
        type: choice
        default: xanmod
        options:
          - xanmod
          - debian
      kernel_ref:
        description: Upstream branch/ref, or auto
        required: true
        type: string
        default: auto
      arch:
        description: Target architecture
        required: true
        type: choice
        default: x86_64
        options:
          - x86_64
          - arm64
          - both
      build_debs:
        description: Produce Debian packages
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      publish_release:
        description: Publish .deb assets to GitHub Releases
        required: true
        type: choice
        default: "false"
        options:
          - "true"
          - "false"
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: write

concurrency:
  group: kernel-build-${{ github.ref }}-${{ inputs.source || 'xanmod' }}-${{ inputs.kernel_ref || 'auto' }}-${{ inputs.arch || 'x86_64' }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          arch="${{ inputs.arch || 'x86_64' }}"
          case "$arch" in
            both) echo 'matrix={"arch":["x86_64","arm64"]}' >> "$GITHUB_OUTPUT" ;;
            x86_64) echo 'matrix={"arch":["x86_64"]}' >> "$GITHUB_OUTPUT" ;;
            arm64) echo 'matrix={"arch":["arm64"]}' >> "$GITHUB_OUTPUT" ;;
            *) echo "unsupported arch: $arch" >&2; exit 2 ;;
          esac

  build:
    name: Build ${{ matrix.arch }}
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout CloudTurbo
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ca-certificates cpio debhelper dwarves fakeroot flex git jq \
            kmod libdw-dev libelf-dev libncurses-dev libssl-dev pahole python3 rsync xz-utils zstd
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            sudo dpkg --add-architecture arm64
            sudo apt-get update
            sudo apt-get install -y \
              gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libssl-dev:arm64
          fi

      - name: Build kernel
        shell: bash
        env:
          SOURCE: ${{ inputs.source || 'xanmod' }}
          KERNEL_REF: ${{ inputs.kernel_ref || 'auto' }}
          TARGET_ARCH: ${{ matrix.arch }}
          BUILD_DEBS: ${{ inputs.build_debs || 'true' }}
          LOCALVERSION: -cloudturbo
        run: bash scripts/build-kernel.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudturbo-${{ matrix.arch }}-${{ github.run_id }}
          path: out/${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 14

      - name: Prepare release metadata
        id: release
        if: ${{ inputs.publish_release == 'true' && inputs.build_debs == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          set -a
          # shellcheck disable=SC1090
          source "out/${{ matrix.arch }}/metadata.env"
          set +a
          safe_ref="$(printf '%s' "$resolved_ref" | tr '/ :' '---' | tr -cd 'A-Za-z0-9._-')"
          sha7="${resolved_sha:0:7}"
          tag="cloudturbo-${source}-${safe_ref}-${sha7}"
          title="CloudTurbo Kernel ${source} ${resolved_ref} (${sha7})"
          notes="out/${{ matrix.arch }}/release-notes.md"
          cat > "$notes" <<EOF
          # ${title}

          - Source: ${source_repo}
          - Ref: ${resolved_ref}
          - SHA: ${resolved_sha}
          - Kernel version: ${kernel_version}
          - Architecture: ${{ matrix.arch }} (${deb_arch})
          - Local version: ${localversion}

          Install with:

          \`\`\`bash
          bash <(curl -fsSL https://raw.githubusercontent.com/LaokeQwQ/CloudTurbo-Kernel/main/install.sh)
          \`\`\`
          EOF
          {
            echo "tag=$tag"
            echo "title=$title"
            echo "notes=$notes"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release == 'true' && inputs.build_debs == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          title="${{ steps.release.outputs.title }}"
          notes="${{ steps.release.outputs.notes }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --target "$GITHUB_SHA" --title "$title" --notes-file "$notes" || true
          fi
          for i in {1..12}; do
            gh release view "$tag" >/dev/null 2>&1 && break
            sleep 5
          done
          gh release upload "$tag" \
            out/${{ matrix.arch }}/*.deb \
            out/${{ matrix.arch }}/metadata.env \
            out/${{ matrix.arch }}/config-${{ matrix.arch }} \
            --clobber