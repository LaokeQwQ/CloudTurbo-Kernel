name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      source:
        description: Upstream source
        required: true
        type: choice
        default: xanmod
        options:
          - xanmod
          - debian
      kernel_ref:
        description: Upstream branch/ref, or auto
        required: true
        type: string
        default: auto
      arch:
        description: Target architecture
        required: true
        type: choice
        default: x86_64
        options:
          - x86_64
          - arm64
          - both
      build_debs:
        description: Produce Debian packages
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      publish_release:
        description: Publish .deb assets to GitHub Releases
        required: true
        type: choice
        default: "false"
        options:
          - "true"
          - "false"
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: write

concurrency:
  group: kernel-build-${{ github.ref }}-${{ inputs.source || 'xanmod' }}-${{ inputs.kernel_ref || 'auto' }}-${{ inputs.arch || 'x86_64' }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          arch="${{ inputs.arch || 'x86_64' }}"
          case "$arch" in
            both) echo 'matrix={"arch":["x86_64","arm64"]}' >> "$GITHUB_OUTPUT" ;;
            x86_64) echo 'matrix={"arch":["x86_64"]}' >> "$GITHUB_OUTPUT" ;;
            arm64) echo 'matrix={"arch":["arm64"]}' >> "$GITHUB_OUTPUT" ;;
            *) echo "unsupported arch: $arch" >&2; exit 2 ;;
          esac

  build:
    name: Build ${{ matrix.arch }}
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout CloudTurbo
        uses: actions/checkout@v4

      - name: Resolve upstream for cache key
        id: upstream
        shell: bash
        run: bash scripts/resolve-upstream.sh "${{ inputs.source || 'xanmod' }}" "${{ inputs.kernel_ref || 'auto' }}"

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ca-certificates ccache cpio curl debhelper dwarves fakeroot flex git jq \
            kmod libdw-dev libelf-dev libncurses-dev libssl-dev pahole python3 rsync xz-utils zstd
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            sudo dpkg --add-architecture arm64
            # GitHub's Ubuntu amd64 runner uses security.ubuntu.com for native packages,
            # but Ubuntu arm64 packages live on ports.ubuntu.com. Restrict native sources
            # to amd64 before adding arm64 ports sources to avoid 404s during apt update.
            sudo python3 - <<'PY'
          from pathlib import Path
          for path in Path('/etc/apt/sources.list.d').glob('*.sources'):
              text = path.read_text()
              stanzas = [s for s in text.split('\n\n') if s.strip()]
              output = []
              for stanza in stanzas:
                  lines = stanza.splitlines()
                  if any(line.startswith('Types:') for line in lines) and not any(line.startswith('Architectures:') for line in lines):
                      new_lines = []
                      for line in lines:
                          new_lines.append(line)
                          if line.startswith('Types:'):
                              new_lines.append('Architectures: amd64')
                      lines = new_lines
                  output.append('\n'.join(lines))
              path.write_text('\n\n'.join(output) + '\n')
          for path in [Path('/etc/apt/sources.list'), *Path('/etc/apt/sources.list.d').glob('*.list')]:
              if path.exists():
                  text = path.read_text()
                  text = text.replace('deb http', 'deb [arch=amd64] http')
                  text = text.replace('deb https', 'deb [arch=amd64] https')
                  path.write_text(text)
          PY
            . /etc/os-release
            codename="${VERSION_CODENAME:-noble}"
            sudo tee /etc/apt/sources.list.d/ubuntu-arm64-ports.list >/dev/null <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${codename}-security main restricted universe multiverse
          EOF
            sudo apt-get update
            sudo apt-get install -y \
              gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libssl-dev:arm64
          fi

      - name: Restore arm64 ccache
        if: ${{ matrix.arch == 'arm64' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ matrix.arch }}-${{ inputs.source || 'xanmod' }}-${{ steps.upstream.outputs.resolved_sha }}-${{ hashFiles('config/cloudturbo-vps.config', 'scripts/*.sh') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.arch }}-${{ inputs.source || 'xanmod' }}-${{ steps.upstream.outputs.resolved_sha }}-
            ccache-${{ runner.os }}-${{ matrix.arch }}-${{ inputs.source || 'xanmod' }}-
            ccache-${{ runner.os }}-${{ matrix.arch }}-

      - name: Configure arm64 ccache
        if: ${{ matrix.arch == 'arm64' }}
        shell: bash
        run: |
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true
          ccache --set-config=compiler_check=content
          ccache --set-config=sloppiness=time_macros,file_macro,include_file_mtime,include_file_ctime
          ccache --zero-stats || true

      - name: Build kernel
        shell: bash
        env:
          SOURCE: ${{ inputs.source || 'xanmod' }}
          KERNEL_REF: ${{ inputs.kernel_ref || 'auto' }}
          TARGET_ARCH: ${{ matrix.arch }}
          BUILD_DEBS: ${{ inputs.build_debs || 'true' }}
          LOCALVERSION: -cloudturbo
          USE_CCACHE: ${{ matrix.arch == 'arm64' && 'true' || 'false' }}
          KBUILD_BUILD_TIMESTAMP: "1970-01-01 00:00:00"
          KBUILD_BUILD_USER: cloudturbo
          KBUILD_BUILD_HOST: github-actions
        run: bash scripts/build-kernel.sh

      - name: Generate package checksums
        if: ${{ inputs.build_debs == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          source "out/${{ matrix.arch }}/metadata.env"
          cd "out/${{ matrix.arch }}"
          shopt -s nullglob
          debs=( *.deb )
          if [[ ${#debs[@]} -eq 0 ]]; then
            echo "No .deb files found for checksum generation" >&2
            exit 1
          fi
          md5sum "${debs[@]}" > "MD5SUMS-${deb_arch}.txt"
          sha1sum "${debs[@]}" > "SHA1SUMS-${deb_arch}.txt"
          sha256sum "${debs[@]}" > "SHA256SUMS-${deb_arch}.txt"
          sha512sum "${debs[@]}" > "SHA512SUMS-${deb_arch}.txt"
          cat "SHA256SUMS-${deb_arch}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudturbo-${{ matrix.arch }}-${{ github.run_id }}
          path: out/${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 14

      - name: Prepare release metadata
        id: release
        if: ${{ inputs.publish_release == 'true' && inputs.build_debs == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          set -a
          # shellcheck disable=SC1090
          source "out/${{ matrix.arch }}/metadata.env"
          set +a
          safe_ref="$(printf '%s' "$resolved_ref" | tr '/ :' '---' | tr -cd 'A-Za-z0-9._-')"
          sha7="${resolved_sha:0:7}"
          tag="cloudturbo-${source}-${safe_ref}-${sha7}"
          title="CloudTurbo Kernel ${source} ${resolved_ref} (${sha7})"
          notes="out/${{ matrix.arch }}/release-notes.md"
          cat > "$notes" <<EOF
          # ${title}

          - Source: ${source_repo}
          - Ref: ${resolved_ref}
          - SHA: ${resolved_sha}
          - Kernel version: ${kernel_version}
          - Uploaded by this job: ${{ matrix.arch }} (${deb_arch})
          - Published architectures: x86_64/amd64 and arm64 when both matrix jobs complete
          - Local version: ${localversion}
          - Includes BBRPlus, BBRv3 as \`bbr\`, Docker-ready nftables NAT, bridge netfilter, veth, and overlayfs support.

          Install with:

          \`\`\`bash
          bash <(curl -fsSL https://raw.githubusercontent.com/LaokeQwQ/CloudTurbo-Kernel/main/install.sh)
          \`\`\`
          EOF
          {
            echo "tag=$tag"
            echo "title=$title"
            echo "notes=$notes"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release == 'true' && inputs.build_debs == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          set -a
          # shellcheck disable=SC1090
          source "out/${{ matrix.arch }}/metadata.env"
          set +a
          tag="${{ steps.release.outputs.tag }}"
          title="${{ steps.release.outputs.title }}"
          notes="${{ steps.release.outputs.notes }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --target "$GITHUB_SHA" --title "$title" --notes-file "$notes" --latest || true
          fi
          for i in {1..12}; do
            gh release view "$tag" >/dev/null 2>&1 && break
            sleep 5
          done
          gh release edit "$tag" --target "$GITHUB_SHA" --title "$title" --notes-file "$notes" --latest
          while IFS= read -r asset; do
            case "$asset" in
              *_${deb_arch}.deb|MD5SUMS-${deb_arch}.txt|SHA1SUMS-${deb_arch}.txt|SHA256SUMS-${deb_arch}.txt|SHA512SUMS-${deb_arch}.txt|config-${{ matrix.arch }})
                gh release delete-asset "$tag" "$asset" -y || true
                ;;
            esac
          done < <(gh release view "$tag" --json assets --jq '.assets[].name')
          gh release upload "$tag" \
            out/${{ matrix.arch }}/*.deb \
            out/${{ matrix.arch }}/metadata.env \
            out/${{ matrix.arch }}/config-${{ matrix.arch }} \
            out/${{ matrix.arch }}/MD5SUMS-*.txt \
            out/${{ matrix.arch }}/SHA1SUMS-*.txt \
            out/${{ matrix.arch }}/SHA256SUMS-*.txt \
            out/${{ matrix.arch }}/SHA512SUMS-*.txt \
            --clobber
